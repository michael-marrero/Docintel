# CI for docintel — Phase 1 gate stack.
# Runs on every push to any branch (FND-05) and on PRs to main.
# CONTEXT.md D-10: single workflow, full gate stack.
# CONTEXT.md D-11: DOCINTEL_LLM_PROVIDER=stub explicit in env (belt-and-suspenders).

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  # Phase 4 D-20: manual trigger for the real-mode index build job below.
  # Default push/PR runs continue to use stub mode only (no API keys, no docker
  # services with `profiles: ['real']`). The real-index-build job is gated on
  # `if: github.event_name == 'workflow_dispatch'` so it never runs on PR.
  workflow_dispatch:
    inputs:
      job:
        description: "Which real-mode job(s) to run (each builds its own index — they are independent)."
        type: choice
        default: real-eval
        options:
          - real-eval
          - real-index-build
          - real-ablation
          - all

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCINTEL_LLM_PROVIDER: stub
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.11"

jobs:

  lint-and-test:
    name: lint + types + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: uv lock --check (lockfile in sync)
        # Run BEFORE uv sync --frozen so a drifted lockfile produces an actionable
        # "lockfile out of date" error instead of a generic --frozen failure.
        run: uv lock --check

      - name: Sync workspace (frozen)
        run: uv sync --all-packages --frozen

      - name: ruff check
        run: uv run ruff check packages/

      - name: black --check
        run: uv run black --check packages/ tests/

      - name: mypy --strict (Phase 2 surface)
        # D-19: ignore_missing_imports removed; per-module overrides cover torch/sentence_transformers/transformers.
        run: uv run mypy --strict packages/*/src

      - name: Build indices (stub)
        # Phase 4 IDX-01..04. Builds NumpyDenseStore + Bm25sStore on every PR.
        # Expected wall-clock < 10s for 6,053 chunks. Stub-mode default.
        # MUST run BEFORE pytest — tests/test_bm25_store.py + tests/test_index_*.py
        # assert against artifacts under data/indices/{bm25,dense}/*.
        run: uv run docintel-index all

      - name: Verify indices (D-14)
        # Re-hash dense + bm25 artifacts; assert MANIFEST sha256s match.
        # Catches non-deterministic build paths AND silent dep drift.
        run: uv run docintel-index verify

      - name: Eval run (stub-mode, EVAL-01/EVAL-03)
        # D-09: generates + validates but does NOT commit. Stub run is fast + deterministic.
        # Must run AFTER "Build indices (stub)" step — make_retriever loads data/indices/.
        # (Pitfall 6: eval step must come after docintel-index all because make_retriever
        # loads data/indices artifacts that must exist first.)
        run: uv run docintel-eval run

      - name: Eval validate (EVAL-04)
        # D-11: validate subcommand is the well-formedness gate (no NaN, all manifest fields,
        # 32 questions). report_dir is the most-recent timestamped dir under data/eval/reports/.
        # ls -1td sorts by mtime so the freshly-generated timestamped dir is newest.
        run: |
          latest=$(ls -1td data/eval/reports/*/ | head -1)
          uv run docintel-eval validate "$latest"

      - name: Eval stub-sample drift gate (EVAL-03)
        # Open-Question-2: auto-detect report-format drift in the committed stub-sample on
        # every PR. Re-validates the canonical committed sample so schema changes are caught
        # before they break the real-mode committed reports.
        run: uv run docintel-eval validate data/eval/reports/stub-sample

      - name: Ablation run (stub-mode, component arms only) (ABL-01/ABL-02)
        # Phase 11 D-10: every-PR stub smoke over the component arms (baseline +
        # no-rerank + dense-only) — generate + validate, NO commit (a committed stub
        # ablation per PR bloats git; stub deltas are non-representative, L-04).
        # ~3 arms x ~0.25s, trivial. The re-chunk/re-index size arms are REAL-mode only
        # (D-04) and are absent from this track — they run solely in the real-ablation job.
        # Must run AFTER "Build indices (stub)" above — each arm's Retriever warms its
        # stores from data/indices/ (Pitfall 6: make_index_stores loads data/indices/).
        run: uv run docintel-eval ablate

      - name: Ablation validate (EVAL-04 extended, D-11)
        # D-11: run the extended ablation gate (all arms present, baseline present, n=32
        # per arm, finite deltas + CIs, seed=42 determinism recompute) on the freshly
        # produced ablation dir. The timestamped run dirs are named YYYYMMDD_* so the
        # `20*/` glob selects only the new run and never the committed stub-sample/ dir
        # (mtime-independent; safer than a bare `*/` glob).
        run: |
          latest=$(ls -1td data/eval/ablations/20*/ | head -1)
          uv run docintel-eval validate "$latest"

      - name: Ablation stub-sample drift gate (D-11)
        # Mirrors the "Eval stub-sample drift gate" above: re-validate the canonical
        # committed sample so a renderer/schema change is caught in the PR diff before it
        # breaks the real-mode committed ablation reports.
        run: uv run docintel-eval validate data/eval/ablations/stub-sample

      - name: pytest
        # Deselect real-mode tests (-m "not real") — they require
        # API keys + qdrant service + HF model download. Real-mode runs
        # in the workflow_dispatch-only real-index-build job below.
        run: uv run pytest -ra -q -m "not real"

      - name: Reranker canary (stub-mode acceptance gate) (RET-03)
        # Phase 5 STRUCTURAL ACCEPTANCE GATE. Per CLAUDE.md: if this fails,
        # look at BGE 512-token truncation FIRST before suspecting hybrid
        # retrieval, RRF, or chunk size.
        run: uv run pytest tests/test_reranker_canary.py -ra -q -m "not real"

      - name: Adapter wrap grep gate (ADP-06)
        # Every real adapter file with an SDK call must import tenacity.
        # Script exits non-zero if any file under packages/docintel-core/src/docintel_core/adapters/real/
        # contains an SDK call pattern but no tenacity import (D-18 structural enforcement).
        run: bash scripts/check_adapter_wraps.sh

      - name: Ingest wrap grep gate (D-18)
        # Every docintel_ingest file with a sec-edgar-downloader call must import tenacity.
        # Script exits non-zero if any file under packages/docintel-ingest/src/docintel_ingest/
        # contains a sec-edgar-downloader SDK call pattern but no tenacity import
        # (D-18 structural enforcement; ADP-06 analog for Phase 3 / ING-*).
        run: bash scripts/check_ingest_wraps.sh

      - name: Index wrap grep gate (D-21)
        # Every adapters/real/*.py file with a qdrant_client.* call must
        # import tenacity. Structurally enforces no-silent-retries on the
        # Qdrant HTTP path (Phase 4 IDX-* / Pitfall 6 dep drift defense).
        run: bash scripts/check_index_wraps.sh

      - name: Check prompt locality (GEN-01)
        # Every prompt-like string literal must live in
        # packages/docintel-generate/src/docintel_generate/prompts.py
        # (the canonical home). Script exits non-zero if any .py file under
        # packages/ contains an inline prompt outside the allowlist
        # (Phase 6 D-04 structural enforcement of GEN-01).
        run: bash scripts/check_prompt_locality.sh

      - name: Check no print (OBS-03)
        # Production code must not use unstructured print(); logs are JSON via
        # structlog (FND-02). Scans packages/*/src; per-line `# noqa: no-print`
        # escape. Phase 12 D-06/D-07/D-08 structural enforcement of OBS-03.
        run: bash scripts/check_no_print.sh

      - name: Check before_sleep_safe (EMP-05 / P-EMP-04)
        # Real adapters must use the sanitizing before_sleep_safe wrapper, not
        # tenacity's raw before_sleep_log (which leaks API-key patterns in
        # retry-path exception strings into committed CI logs). Two-sided:
        # (a) no raw before_sleep_log in adapters/real/;
        # (b) every @retry-using file imports before_sleep_safe.
        # Phase 14 D-06 structural enforcement of EMP-05.
        run: bash scripts/check_before_sleep_safe.sh

      - name: Chunk-idempotency gate (ING-04)
        # ING-04 byte-identity acceptance gate. Re-runs the chunker on the
        # committed normalized JSON and asserts byte-identity vs. committed
        # JSONL; re-computes every sha256 in MANIFEST.json. Headline Phase 3
        # acceptance gate — must stay green on every PR.
        run: uv run pytest tests/test_chunk_idempotency.py -ra -q

      - name: Ground-truth eval set well-formedness gate (GT-02)
        # Phase 8: EvalRecord schema, citations⊆golds, gold-id resolution, refusal-empties, D-17 flavors, ≥30/15/10/5 mix. Stub-eligible.
        run: uv run pytest tests/test_eval_dataset_schema.py -ra -q

  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans history; full clone required.

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  docker-build-and-size:
    name: docker build + image size cap
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        run: |
          docker build \
            --target api \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t docintel-api:ci \
            -f docker/Dockerfile \
            --load \
            .

      - name: Assert image size < 3 GiB (CONTEXT.md D-08)
        run: |
          set -euo pipefail
          MAX=3221225472  # 3 * 1024^3
          for img in docintel-api:ci; do
            sz=$(docker image inspect "$img" --format='{{.Size}}')
            echo "  $img: $sz bytes"
            if [ "$sz" -ge "$MAX" ]; then
              echo "FAIL: $img is $sz bytes (>= $MAX = 3 GiB)"
              exit 1
            fi
          done

      - name: Save image for compose-smoke job
        run: |
          docker save docintel-api:ci -o /tmp/docintel-api.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docintel-images
          path: |
            /tmp/docintel-api.tar
          retention-days: 1

  compose-smoke:
    name: docker-compose smoke (curl /health)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-build-and-size
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docintel-images
          path: /tmp

      - name: Load prebuilt image
        run: |
          docker load -i /tmp/docintel-api.tar
          # Tag with the name docker-compose.yml expects so it does NOT rebuild.
          docker tag docintel-api:ci docintel-api:local

      - name: Bring up the stack
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          # `--no-build` forces compose to use the loaded images.
          docker compose up -d --no-build
          docker compose ps

      - name: Wait for healthchecks
        run: |
          set -euo pipefail
          for svc in api; do
            for i in {1..30}; do
              health=$(docker inspect --format='{{.State.Health.Status}}' "docintel-$svc" 2>/dev/null || echo "missing")
              echo "  $svc: $health (attempt $i/30)"
              if [ "$health" = "healthy" ]; then break; fi
              sleep 2
            done
            if [ "$health" != "healthy" ]; then
              echo "FAIL: $svc never became healthy"
              docker compose logs "$svc"
              exit 1
            fi
          done

      - name: Curl /health (api)
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8000/health | tee /tmp/health.json
          jq -e '.status == "ok" and .service == "docintel-api" and .provider == "stub"' /tmp/health.json

      - name: Tear down
        if: always()
        run: docker compose down -v

  # Phase 4 D-20: real-mode index build, manual trigger only.
  # Gated on `workflow_dispatch` — never runs on push/PR. Spins up the qdrant
  # service via the compose `real` profile, waits for /readyz, runs the
  # docintel-index build + verify pair against real Qdrant, then runs the
  # `pytest -m real` slice (deselected by default). Tear-down runs in
  # `if: always()` so a failed run leaves no zombie containers. The 15-minute
  # timeout caps the entire job (T-4-V5-02 DoS mitigation).
  real-index-build:
    name: real-mode index build (manual trigger only)
    # Runs only when explicitly selected via the workflow_dispatch `job` input
    # (or job=all). Default dispatch (job=real-eval) skips this.
    if: github.event_name == 'workflow_dispatch' && (inputs.job == 'real-index-build' || inputs.job == 'all')
    runs-on: ubuntu-latest
    # 30-min budget: Phase 4's index build is ~7 min, Phase 5's canary adds
    # bge-reranker-base download (~250 MB) + 8-case reranking (~10-15 min).
    # Run 25890137612 cancelled at the original 15-min cap.
    timeout-minutes: 30
    env:
      DOCINTEL_LLM_PROVIDER: real
      # ADR-014 / D-14: real-mode runs against NVIDIA NIM's OpenAI-compatible
      # endpoint serving open-weight gpt-oss-120b, judged cross-family by
      # Llama-3.3-70B (distinct-model — see ADR-014). The nvapi-... key lives in
      # the OPENAI_API_KEY repo secret; ANTHROPIC_API_KEY is unused on this path
      # (judge_model set → judge is a 2nd OpenAI adapter) but retained so a revert
      # to cross-PROVIDER eval needs only these four DOCINTEL_ lines removed.
      DOCINTEL_LLM_REAL_PROVIDER: openai
      DOCINTEL_OPENAI_BASE_URL: https://integrate.api.nvidia.com/v1
      DOCINTEL_OPENAI_MODEL: nvidia/llama-3.3-nemotron-super-49b-v1
      DOCINTEL_JUDGE_MODEL: z-ai/glm-5.2
      # EMP-01 (Phase 14): pass through real provider API-key secrets so the
      # llm_anthropic / llm_openai adapters can initialize when DOCINTEL_LLM_PROVIDER=real.
      # The secret names on the repo side are unprefixed (ANTHROPIC_API_KEY,
      # OPENAI_API_KEY); the adapter-side names are DOCINTEL_-prefixed.
      DOCINTEL_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DOCINTEL_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # EMP-01: judge runs on a SECOND nvapi key so gen(32)+judge(32) don't exhaust
      # one NIM key's ~32-request worker cap. Falls back to OPENAI_API_KEY if unset.
      DOCINTEL_JUDGE_OPENAI_API_KEY: ${{ secrets.NIM_JUDGE_API_KEY }}
      # The python process runs on the runner host, NOT inside the docker
      # network — so the default ``qdrant`` service hostname (from
      # docker-compose.yml D-05) cannot be resolved. Override to localhost
      # since the qdrant service maps port 6333 to the host. Run
      # 25894710677 failed with `httpx.ConnectError: name resolution`
      # because this override was missing.
      DOCINTEL_QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace (frozen)
        run: uv sync --all-packages --frozen

      - name: Pre-create data/indices/ as runner-owned
        # The qdrant compose volume mount (./data/indices/.qdrant) creates
        # parent dirs on the host as ROOT. If the python process tries to
        # mkdir data/indices/bm25/ later, it fails with EACCES. Pre-creating
        # the dirs as the runner user before docker starts claims ownership.
        # Run 25895662489 failed with `PermissionError` because this was missing.
        run: mkdir -p data/indices/bm25 data/indices/dense data/indices/.qdrant

      - name: Start qdrant via compose profile 'real'
        run: docker compose --profile real up -d qdrant

      - name: Wait for qdrant /readyz
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -fsS http://localhost:6333/readyz; then
              echo "qdrant ready on attempt $i"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: qdrant /readyz never returned 200"
          docker compose --profile real logs qdrant
          exit 1

      - name: Real-mode build
        run: uv run docintel-index all

      - name: Real-mode verify
        run: uv run docintel-index verify

      - name: Real-only pytest
        run: uv run pytest -m real -ra -q

      - name: Tear down
        if: always()
        run: docker compose --profile real down -v

  # Phase 10 D-10: real-mode eval run, manual trigger only.
  # Mirrors real-index-build. Gated on workflow_dispatch — never runs on push/PR
  # (no API keys on untrusted PRs, T-10-CI1). Builds the real index, runs the
  # full 32-question eval, validates the produced report, and COMMITS it under
  # data/eval/reports/<ts>/ with [skip ci] so the published numbers are in-repo.
  # The stub PR eval (lint-and-test Eval run step) generates + validates but
  # never commits (D-09); only this job and the one canonical stub-sample commit.
  real-eval:
    name: real-mode eval run (manual trigger only)
    # Default dispatch target (job=real-eval). Builds its own index inline, so it
    # is self-contained — does not depend on the real-index-build job.
    if: github.event_name == 'workflow_dispatch' && (inputs.job == 'real-eval' || inputs.job == 'all')
    runs-on: ubuntu-latest
    # 120-min budget (30→50→80→120): cold setup ~13 min + index ~7 min + 32 slow
    # nemotron generations + 32 nemotron-3-ultra-550b reasoning-judge calls (the
    # judge is a 550B reasoning model, materially slower than the prior llama judge).
    # The nim_probe (step 6) reveals the real per-judge latency before the full loop.
    timeout-minutes: 120
    permissions:
      contents: write # CR-01: required for the "Commit report (D-10)" git push step
    env:
      DOCINTEL_LLM_PROVIDER: real
      # ADR-014 / D-14: real-eval runs against NVIDIA NIM (gpt-oss-120b generator,
      # Llama-3.3-70B cross-family judge). nvapi-... key in the OPENAI_API_KEY
      # secret; ANTHROPIC_API_KEY unused on this path. Remove these four lines to
      # revert to the v1.0 cross-PROVIDER eval. See ADR-014.
      DOCINTEL_LLM_REAL_PROVIDER: openai
      DOCINTEL_OPENAI_BASE_URL: https://integrate.api.nvidia.com/v1
      DOCINTEL_OPENAI_MODEL: nvidia/llama-3.3-nemotron-super-49b-v1
      DOCINTEL_JUDGE_MODEL: z-ai/glm-5.2
      # EMP-01 (Phase 14): pass through real provider API-key secrets — see
      # the matching block in the real-mode index build job for the rationale.
      DOCINTEL_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DOCINTEL_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # EMP-01: judge runs on a SECOND nvapi key so gen(32)+judge(32) don't exhaust
      # one NIM key's ~32-request worker cap. Falls back to OPENAI_API_KEY if unset.
      DOCINTEL_JUDGE_OPENAI_API_KEY: ${{ secrets.NIM_JUDGE_API_KEY }}
      # The python process runs on the runner host, NOT inside the docker
      # network — override to localhost since qdrant maps port 6333 to host.
      DOCINTEL_QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace (frozen)
        run: uv sync --all-packages --frozen

      - name: ADR-014 NIM endpoint probe (fail fast before the full eval)
        # ADR-014 gate: two raw adapter calls (generate + judge) confirm the NIM
        # endpoint/key/model resolve AND the judge model honors strict json_schema
        # BEFORE the ~15-min index build + 32-question eval. A judge that ignores
        # the schema silently scores every answer 0 (Pitfall 6); this catches it
        # for the cost of two API calls. No qdrant/corpus needed.
        run: uv run python scripts/nim_probe.py

      - name: Pre-create data/indices/ as runner-owned
        # Pre-create before docker starts so the runner user owns the dirs
        # (qdrant compose volume mount creates parent dirs as root otherwise).
        run: mkdir -p data/indices/bm25 data/indices/dense data/indices/.qdrant

      - name: Start qdrant via compose profile 'real'
        run: docker compose --profile real up -d qdrant

      - name: Wait for qdrant /readyz
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -fsS http://localhost:6333/readyz; then
              echo "qdrant ready on attempt $i"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: qdrant /readyz never returned 200"
          docker compose --profile real logs qdrant
          exit 1

      - name: Real-mode index build
        run: uv run docintel-index all

      - name: Real-mode eval run
        run: uv run docintel-eval run

      - name: Real-mode eval validate
        # D-11: validate the freshly-produced report before committing.
        # ls -1td sorts by mtime; the just-produced timestamped dir is newest.
        run: |
          latest=$(ls -1td data/eval/reports/*/ | head -1)
          uv run docintel-eval validate "$latest"

      - name: Commit report (D-10)
        # D-10: committed reports come from real-mode workflow_dispatch runs.
        # [skip ci] prevents an infinite trigger loop. The GITHUB_TOKEN is
        # GitHub-managed and scoped to the repo — no project secret introduced.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eval/reports/
          git commit -m "chore: commit real-mode eval report [skip ci]" || echo "Nothing to commit"
          git push

      - name: Tear down
        if: always()
        run: docker compose --profile real down -v

  # Phase 11 D-09 / D-04: real-mode ablation run, manual trigger only.
  # Sibling of real-eval; mirrors its qdrant bring-up + EACCES pre-create + teardown.
  # Gated on workflow_dispatch — never runs on push/PR (T-11-07 cost guard: the
  # re-chunk -> re-embed -> re-index x{300,600} + multi-arm real eval is the
  # real-pipeline cost offline-first stub-CI deliberately avoids; T-11-12: no API
  # keys on untrusted PRs). Builds the production (450) index, builds the size-300/600
  # indices via the Plan 04 sweep target, runs ablate in real mode (all arms incl.
  # the chunk-size sweep), validates the produced ablation dir, and COMMITS the
  # ablation-report.md + sidecars under data/eval/ablations/<ts>/ with [skip ci] so
  # the published deltas are in-repo (Phase 13 README input). The stub PR ablation
  # (lint-and-test) generates + validates but never commits (D-10); only this job and
  # the one canonical committed stub-sample.
  real-ablation:
    name: real-mode ablation run (manual trigger only)
    # 60-min job — runs only when explicitly selected (job=real-ablation or all).
    # Default dispatch (job=real-eval) skips this.
    if: github.event_name == 'workflow_dispatch' && (inputs.job == 'real-ablation' || inputs.job == 'all')
    runs-on: ubuntu-latest
    # 60-min budget (vs real-eval's 30): this job does the production index build
    # PLUS the chunk-size sweep — re-chunk + re-embed + re-index at sizes 300 and 600
    # (450 reuses the production baseline) — PLUS a real eval over ~6 arms (baseline +
    # no-rerank + dense-only + chunk-300/450/600), each arm a full 32-question pass.
    # That is materially heavier than real-eval's single index + single eval, so the
    # cap is doubled. Raise further if the sweep build dominates. The timeout is the
    # DoS bound (T-11-07), same role as real-eval's cap.
    timeout-minutes: 60
    permissions:
      contents: write # required for the "Commit ablation report (D-09)" git push step
    env:
      DOCINTEL_LLM_PROVIDER: real
      # ADR-014 / D-14: real-ablation runs against NVIDIA NIM (gpt-oss-120b
      # generator, Llama-3.3-70B cross-family judge). nvapi-... key in the
      # OPENAI_API_KEY secret; ANTHROPIC_API_KEY unused on this path. Remove these
      # four lines to revert to the v1.0 cross-PROVIDER eval. See ADR-014.
      DOCINTEL_LLM_REAL_PROVIDER: openai
      DOCINTEL_OPENAI_BASE_URL: https://integrate.api.nvidia.com/v1
      DOCINTEL_OPENAI_MODEL: nvidia/llama-3.3-nemotron-super-49b-v1
      DOCINTEL_JUDGE_MODEL: z-ai/glm-5.2
      # EMP-01 (Phase 14): pass through real provider API-key secrets — see
      # the matching block in the real-mode index build job for the rationale.
      DOCINTEL_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DOCINTEL_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # EMP-01: judge runs on a SECOND nvapi key so gen(32)+judge(32) don't exhaust
      # one NIM key's ~32-request worker cap. Falls back to OPENAI_API_KEY if unset.
      DOCINTEL_JUDGE_OPENAI_API_KEY: ${{ secrets.NIM_JUDGE_API_KEY }}
      # The python process runs on the runner host, NOT inside the docker
      # network — override to localhost since qdrant maps port 6333 to host.
      DOCINTEL_QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace (frozen)
        run: uv sync --all-packages --frozen

      - name: Pre-create data/indices/ as runner-owned
        # Pre-create before docker starts so the runner user owns the dirs
        # (qdrant compose volume mount creates parent dirs as root otherwise).
        run: mkdir -p data/indices/bm25 data/indices/dense data/indices/.qdrant

      - name: Start qdrant via compose profile 'real'
        run: docker compose --profile real up -d qdrant

      - name: Wait for qdrant /readyz
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -fsS http://localhost:6333/readyz; then
              echo "qdrant ready on attempt $i"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: qdrant /readyz never returned 200"
          docker compose --profile real logs qdrant
          exit 1

      - name: Build production index (450 baseline)
        # The baseline + no-rerank + dense-only arms all run against this production
        # 450-token index. The chunk-450 sweep arm reuses it too (no rebuild).
        run: uv run docintel-index all

      - name: Build chunk-sweep indices (300/450/600)
        # Plan 04 (D-05): re-chunk + re-index at 300 and 600 into gitignored size roots
        # under data/indices/chunk-{300,600}/ (450 reuses the production index above).
        # MUST run before "Real-mode ablation run" so the chunk arms find their indices.
        run: make ablate-chunk-sweep

      - name: Real-mode ablation run (all arms incl. chunk sweep)
        # Real mode appends the chunk-300/450/600 arms at the run_ablations seam (Plan 02);
        # baseline + no-rerank + dense-only run as in stub. One process -> one git SHA,
        # one dataset hash, one seed -> a valid paired bootstrap across all arms (D-01).
        run: uv run docintel-eval ablate

      - name: Real-mode ablation validate
        # D-11: extended gate now also covers the chunk arms (validate reads the manifest
        # arm list). Same 20*/ glob as the stub track — selects the fresh run, never the
        # committed stub-sample/ dir.
        run: |
          latest=$(ls -1td data/eval/ablations/20*/ | head -1)
          uv run docintel-eval validate "$latest"

      - name: Commit ablation report (D-09)
        # D-09: committed ablation reports come from real-mode workflow_dispatch runs.
        # [skip ci] prevents an infinite trigger loop (mirror real-eval's commit step).
        # The GITHUB_TOKEN is GitHub-managed and scoped to the repo — no project secret
        # introduced (T-11-12). data/eval/ablations/ is tracked (only data/eval/cache/ is
        # gitignored, D-08); the size indices under data/indices/ stay gitignored (A3) so
        # `git add data/eval/ablations/` never stages them.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eval/ablations/
          git commit -m "chore: commit real-mode ablation report [skip ci]" || echo "Nothing to commit"
          git push

      - name: Tear down
        if: always()
        run: docker compose --profile real down -v
