[project]
name = "docintel-eval"
version = "0.1.0"
description = "Eval CLI scaffold for docintel (Phase 1 placeholder)"
requires-python = ">=3.11,<3.13"
dependencies = [
    "docintel-core",
    "scipy>=1.17",   # Wilson CI: binomtest(k,n).proportion_ci(method='wilson') — MET-01..04
    "numpy>=2.4",    # Paired bootstrap: np.random.default_rng(seed).integers() — MET-06
]

[project.scripts]
docintel-eval = "docintel_eval.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docintel_eval"]
