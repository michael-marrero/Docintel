[project]
name = "docintel-ingest"
version = "0.1.0"
description = "SEC 10-K corpus ingestion (fetch + normalize + chunk) for docintel"
requires-python = ">=3.11,<3.13"
dependencies = [
    "docintel-core",
    "sec-edgar-downloader==5.1.0",
    "selectolax==0.4.8",
]

[project.scripts]
docintel-ingest = "docintel_ingest.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docintel_ingest"]
