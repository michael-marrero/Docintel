[project]
name = "docintel-api"
version = "0.1.0"
description = "FastAPI service for docintel (depends on docintel-core)"
requires-python = ">=3.11,<3.13"
dependencies = [
    "docintel-core",
    "fastapi==0.136.1",
    "uvicorn[standard]==0.46.0",
    # torch + sentence-transformers are pinned in packages/docintel-core/pyproject.toml
    # (D-11); docintel-api receives them transitively via the docintel-core workspace dep.
]

[project.scripts]
docintel-api = "docintel_api.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docintel_api"]
