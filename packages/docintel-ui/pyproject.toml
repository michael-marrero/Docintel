[project]
name = "docintel-ui"
version = "0.1.0"
description = "Streamlit UI for docintel (depends on docintel-core)"
requires-python = ">=3.11,<3.13"
dependencies = [
    "docintel-core",
    "streamlit==1.56.0",
    "httpx==0.28.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docintel_ui"]
