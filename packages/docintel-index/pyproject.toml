[project]
name = "docintel-index"
version = "0.1.0"
description = "Dense + BM25 index build/verify CLI for docintel"
requires-python = ">=3.11,<3.13"
dependencies = [
    "docintel-core",
    "bm25s==0.3.9",
    "PyStemmer==3.0.0",
    "qdrant-client==1.18.0",
]

[project.scripts]
docintel-index = "docintel_index.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docintel_index"]
