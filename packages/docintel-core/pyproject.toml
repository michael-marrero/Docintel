[project]
name = "docintel-core"
version = "0.1.0"
description = "Shared config, types, and version constants for docintel"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pydantic==2.13.3",
    "pydantic-settings==2.14.0",
    "structlog==25.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docintel_core"]
