# docintel — docker-compose.yml
#
# Spec §11 "Definition of Done": `git clone && docker-compose up` produces a
# working demo on a fresh machine.
#
# CONTEXT.md D-07: both services run from as-built images on a shared network,
# X-Trace-Id propagates between them, no bind mounts in the default compose
# (an opt-in docker-compose.dev.yml override may add hot-reload in Phase 3+).
# CONTEXT.md D-09: GIT_SHA flows through ARG → ENV DOCINTEL_GIT_SHA.
# CONTEXT.md D-11: DOCINTEL_LLM_PROVIDER=stub is set explicitly here even
# though the Dockerfile already defaults to stub — belt-and-suspenders.

name: docintel

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: docintel-api:local
    container_name: docintel-api
    environment:
      DOCINTEL_LLM_PROVIDER: stub
      DOCINTEL_GIT_SHA: ${GIT_SHA:-unknown}
      DOCINTEL_DATA_DIR: /app/data
    ports:
      - "8000:8000"
    networks:
      - docintel-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      start_period: 8s
      retries: 3
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: ui
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: docintel-ui:local
    container_name: docintel-ui
    depends_on:
      api:
        condition: service_healthy
    environment:
      DOCINTEL_LLM_PROVIDER: stub
      DOCINTEL_GIT_SHA: ${GIT_SHA:-unknown}
      # The UI calls the api by container hostname on the shared network.
      DOCINTEL_API_URL: http://api:8000
    ports:
      - "8501:8501"
    networks:
      - docintel-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Phase 4 D-05: Qdrant dense backend — REAL MODE ONLY (compose profile real).
  # Default 'docker-compose up' does NOT start this service (UI-06 / Pitfall 7).
  # Intentionally NO depends_on link from api to qdrant — adding one would
  # force qdrant to be present for the default stub-mode demo and break UI-06.
  qdrant:
    image: qdrant/qdrant:v1.18.0
    profiles: ['real']
    container_name: docintel-qdrant
    ports:
      - "6333:6333"  # REST
      - "6334:6334"  # gRPC (qdrant-client may use it for upload_points)
    volumes:
      - ./data/indices/.qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - docintel-net

networks:
  docintel-net:
    driver: bridge
