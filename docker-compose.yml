# docintel — docker-compose.yml
#
# Spec §11 "Definition of Done": `git clone && docker-compose up` produces a
# working demo on a fresh machine.
#
# The api serves the static web/ analyst workspace at / (StaticFiles mount),
# so a single service backs the demo. No bind mounts in the default compose
# (an opt-in docker-compose.dev.yml override may add hot-reload in Phase 3+).
# CONTEXT.md D-09: GIT_SHA flows through ARG → ENV DOCINTEL_GIT_SHA.
# CONTEXT.md D-11: DOCINTEL_LLM_PROVIDER=stub is set explicitly here even
# though the Dockerfile already defaults to stub — belt-and-suspenders.

name: docintel

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: docintel-api:local
    container_name: docintel-api
    environment:
      # Provider + tier (Epic 4). Default = the offline-first stub demo; override
      # via .env for the open tier (BYO hosted key) or sealed tier (local-only).
      DOCINTEL_LLM_PROVIDER: ${DOCINTEL_LLM_PROVIDER:-stub}
      DOCINTEL_TIER: ${DOCINTEL_TIER:-open}
      DOCINTEL_LLM_REAL_PROVIDER: ${DOCINTEL_LLM_REAL_PROVIDER:-anthropic}
      # Secrets pass from the host env (never baked into the image — NFR-SEC3).
      DOCINTEL_ANTHROPIC_API_KEY: ${DOCINTEL_ANTHROPIC_API_KEY:-}
      DOCINTEL_OPENAI_API_KEY: ${DOCINTEL_OPENAI_API_KEY:-}
      DOCINTEL_OPENAI_BASE_URL: ${DOCINTEL_OPENAI_BASE_URL:-}
      # Offline license (AD-18). Empty → the unlicensed demo grant.
      DOCINTEL_LICENSE_KEY: ${DOCINTEL_LICENSE_KEY:-}
      DOCINTEL_LICENSE_PUBLIC_KEY_HEX: ${DOCINTEL_LICENSE_PUBLIC_KEY_HEX:-}
      DOCINTEL_GIT_SHA: ${GIT_SHA:-unknown}
      DOCINTEL_DATA_DIR: /app/data
    ports:
      - "8000:8000"
    networks:
      - docintel-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      # Raised 8s -> 30s for Phase 13 UI-06: the api entrypoint
      # (docker/entrypoint-api.sh) builds the stub/NumPy index at first
      # container boot before exec'ing uvicorn. Stub build itself is
      # sub-second, but Python + uv cold-start can take a few seconds on
      # a fresh image. Subsequent starts hit the idempotent MANIFEST.json
      # skip path. retries=3 × interval=10s still catches genuinely broken
      # containers within ~60s of total startup time.
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # Phase 4 D-05: Qdrant dense backend — REAL MODE ONLY (compose profile real).
  # Default 'docker-compose up' does NOT start this service (UI-06 / Pitfall 7).
  # Intentionally NO depends_on link from api to qdrant — adding one would
  # force qdrant to be present for the default stub-mode demo and break UI-06.
  qdrant:
    image: qdrant/qdrant:v1.18.0
    profiles: ['real']
    container_name: docintel-qdrant
    ports:
      - "6333:6333"  # REST
      - "6334:6334"  # gRPC (qdrant-client may use it for upload_points)
    volumes:
      - ./data/indices/.qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - docintel-net

networks:
  docintel-net:
    driver: bridge
